<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WFlows — Quiet automation. Loud results.</title>
<link rel="stylesheet" href="site.css" />
<style>
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="Bento.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="CTA.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Modal.jsx"></script>

<script type="text/babel">
function App() {
  const [modalOpen, setModalOpen] = React.useState(false);
  const open = () => setModalOpen(true);
  return (
    <>
      <Nav onCta={open} />
      <Hero onCta={open} />
      <Stats />
      <Bento />
      <Testimonial />
      <CTA onCta={open} />
      <Footer />
      <Modal open={modalOpen} onClose={() => setModalOpen(false)} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
